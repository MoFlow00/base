name: Auto Update IPTV
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # نسخة أكثر استقراراً مع المكتبات دي

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloakbrowser
          # تثبيت المكتبات اللي بيعتمد عليها المتصفح في Linux
          python -m cloakbrowser install
          # الأمر ده مهم جداً عشان الـ Runner يقدر يفتح المتصفح
          pip install playwright
          playwright install-deps chromium 

      - name: Run Scraper
        run: python update_iptv.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add final.m3u
          git commit -m "Auto-update IPTV $(date)" || exit 0
          git push
