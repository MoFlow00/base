name: Daily IPTV Auto Update

on:
  schedule:
    # يشتغل تلقائياً كل يوم الساعة 7 صباحاً UTC (تساوي 10 صباحاً بتوقيتك المحلي)
    - cron: '0 7 * * *'
  workflow_dispatch: # يتيح لك تشغيله يدوياً بضغطة زر من موقع جيت هاب في أي وقت

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إعطاء السيرفر صلاحية تعديل ورفع الملفات للمستودع

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright cloakbrowser

    - name: Install Playwright Chromium and System Deps
      run: |
        playwright install chromium
        playwright install-deps

    - name: Run IPTV Update Script
      run: |
        python update_iptv.py

    - name: Commit and Push Updated final.m3u
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # تحقق لو تم تحديث الملف فعلياً لتجنب الرفع بدون تغييرات
        if git status --porcelain | grep -q "final.m3u"; then
          git add final.m3u
          git commit -m "📝 Auto-updated final.m3u [$(date -u +'%Y-%m-%d %H:%M:%S' -d '+3 hours')]"
          git push
          print("✅ New credentials pushed to GitHub repository.")
        else
          print("ℹ️ No changes detected in final.m3u.")
        fi
        - name: Run IPTV Update Script
      run: |
        python update_iptv.py

    # 🚀 خطوة رفع الصورة التشخيصية في حال فشل السكربت
    - name: Upload Error Screenshot
      if: always() # تعمل دائماً حتى لو انهار السكربت
      uses: actions/upload-artifact@v4
      with:
        name: diagnostic-screenshot
        path: error_debug.png
