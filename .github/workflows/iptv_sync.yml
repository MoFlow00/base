name: Update IPTV List

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # تشغيل تلقائي كل 6 ساعات كمثال
  workflow_dispatch: # للتشغيل اليدوي من موقع جيت هاب

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/configure-pages@v5 # أو إعداد بايثون العادي
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Google Chrome and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip
        # تثبيت متصفح كروم الرسمي المستقر على سيرفر الوبونتو
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install selenium

    - name: Run IPTV Update Script
      run: |
        # تشغيل السكربت مع إرسال خيار headless لأن السيرفر بدون شاشة
        python update_iptv.py headless
