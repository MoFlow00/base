name: Auto Update IPTV Credentials

on:
  schedule:
    # التشغيل كل 23 ساعة
    - cron: '0 */23 * * *'
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraper
        run: python update_iptv.py

      - name: Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add final.m3u
          # التأكد من وجود تغييرات قبل الـ Commit لتجنب الخطأ
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update IPTV Credentials $(date)" && git push)
