name: Auto Update IPTV
on:
  schedule:
    - cron: '0 2 * * *' # تشغيل يومي الساعة 2 صباحاً
  workflow_dispatch: # زر تشغيل يدوي

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install cloakbrowser playwright-core
          python -m cloakbrowser install # تحميل المتصفح المعدل

      - name: Run Scraper
        run: python update_iptv.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add final.m3u
          git commit -m "Auto-update IPTV credentials" || exit 0
          git push
