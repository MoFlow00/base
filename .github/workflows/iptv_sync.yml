name: Update IPTV List

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        # تثبيت مكتبة المطور ومكتبة الأتمتة الأساسية
        pip install playwright cloakbrowser

    - name: Install Playwright Browsers & System Deps
      run: |
        # تثبيت متصفحات جيت هاب المخصصة وحزم النظام المفقودة للينكس
        playwright install chromium
        playwright install-deps

    - name: Run IPTV Update Script
      run: |
        python update_iptv.py
