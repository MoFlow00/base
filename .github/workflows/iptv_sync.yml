name: Auto Update IPTV
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. تحميل المتصفح والمكتبات أولاً على شبكة جيتهاب المباشرة بدون VPN لضمان الثبات
      - name: Install Dependencies & Download Browser
        run: |
          python -m pip install --upgrade pip
          pip install requests cloakbrowser
          python -m cloakbrowser install
          pip install playwright
          playwright install-deps chromium 

      # 2. تثبيت أداة WireGuard وتجهيز الإعدادات
      - name: Install WireGuard Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf

      - name: Setup WireGuard Configuration
        run: |
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'cat << EOF > /etc/wireguard/wg0.conf
          [Interface]
          Address = 172.16.0.2/32, 2606:4700:110:8b41:ff01:9a1b:f205:c01e/128
          DNS = 1.1.1.1, 2606:4700:4700::1111, 1.0.0.1, 2606:4700:4700::1001
          MTU = 1280
          PrivateKey = wMjqsNXB9LhRUepQTQnEUm9fAdSyN8MKo5nCQcsvxWQ=

          [Peer]
          AllowedIPs = 0.0.0.0/0, ::/0
          Endpoint = 162.159.195.4:500
          PersistentKeepalive = 25
          PublicKey = bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
          EOF'

      # 3. تشغيل الـ VPN قبل خطوة الكشط مباشرة لحماية الـ IP
      - name: Start WireGuard Tunnel
        run: |
          sudo wg-quick up wg0
          echo "Verifying Clean Public IP:"
          curl ifconfig.me

      # 4. تشغيل الـ Scraper
      - name: Run Scraper
        run: python update_iptv.py

      # 5. إغلاق النفق بعد الانتهاء
      - name: Stop WireGuard Tunnel
        if: always()
        run: |
          if command -v wg-quick >/dev/null 2>&1; then
            sudo wg-quick down wg0
          fi

      # 6. الرفع لـ GitHub
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add final.m3u
          git commit -m "Auto-update IPTV $(date)" || exit 0
          git push
