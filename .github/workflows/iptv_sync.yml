name: Auto Update IPTV Credentials

on:
  schedule:
    - cron: '0 */23 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraper
        run: python update_iptv.py

      - name: Upload Debug Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-debug
          path: cloudflare_status.png

      - name: Push Changes
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add final.m3u
          git commit -m "Update IPTV Credentials $(date)"
          git push
