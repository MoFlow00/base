name: Daily IPTV Auto Update

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent hanging
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Important for git operations

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'  # Enable pip caching

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libnspr4 \
          libatk-bridge2.0-0 \
          libatk1.0-0 \
          libcups2 \
          libdrm2 \
          libdbus-1-3 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxrandr2 \
          libgbm1 \
          libpango-1.0-0 \
          libcairo2 \
          libasound2 \
          libatspi2.0-0 \
          libwayland-client0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright cloakbrowser

    - name: Install Playwright Browsers
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Run IPTV Update Script
      id: run_script
      continue-on-error: true  # Don't stop if script fails
      run: |
        python update_iptv.py
      env:
        PYTHONUNBUFFERED: 1  # Get real-time output
        DISPLAY: :99  # Virtual display

    - name: Start Virtual Display (if needed)
      run: |
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1920x1080x24 &
        echo "Virtual display started"

    - name: Commit and Push Updated final.m3u
      if: success()
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        if [ -f "final.m3u" ]; then
          if git diff --quiet final.m3u; then
            echo "ℹ️ No changes in final.m3u"
          else
            git add final.m3u
            git commit -m "📝 Auto-updated final.m3u [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
            echo "✅ Changes pushed to repository"
          fi
        else
          echo "⚠️ final.m3u not found"
        fi

    - name: Upload Debug Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: |
          debug_screenshot.png
          error_debug.png
          debug_page.png
        retention-days: 7  # Keep for 7 days
