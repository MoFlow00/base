name: Scheduled IPTV Update

on:
  schedule:
    # سيتم التشغيل كل 23 ساعة
    - cron: '0 */23 * * *'
  workflow_dispatch: # للتشغيل اليدوي للتجربة

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraper and Update
        run: python scraper_update.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add final.m3u
          git commit -m "Auto-update IPTV credentials: $(date)" || echo "No changes to commit"
          git push
